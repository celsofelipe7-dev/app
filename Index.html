<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Meus Gastos"/>
<meta name="theme-color" content="#ffffff"/>
<title>Meus Gastos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:600px;margin:0 auto;padding:1rem 1rem 5rem}
h1{font-size:20px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}

/* NAV */
.nav{display:flex;align-items:center;gap:6px;margin-bottom:1rem;background:#fff;border-radius:12px;padding:.6rem .8rem;border:.5px solid #e0e0d8}
.navg{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
.nsep{width:.5px;height:18px;background:#e0e0d8;flex-shrink:0}
.bn{width:28px;height:28px;border-radius:50%;border:.5px solid #d0d0c8;background:transparent;color:#1a1a1a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bn:active{background:#f0f0ea}
.bn:disabled{opacity:.3}
.nv{font-size:14px;font-weight:600;color:#1a1a1a;min-width:110px;text-align:center}
.nv.yr{font-size:12px;font-weight:400;color:#888;min-width:44px}

/* CHART */
.chart-wrap{background:#fff;border-radius:12px;padding:.8rem 1rem;margin-bottom:.8rem;border:.5px solid #e0e0d8}
.chart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:11px;color:#888}
.bars12{display:flex;align-items:flex-end;gap:3px;height:44px}
.mb{flex:1;border-radius:3px 3px 0 0;cursor:pointer;min-width:0;background:#e0e0d8;transition:opacity .15s}
.mb.act{background:#1a1a1a}
.mb.best{background:#1D9E75}
.mb.worst{background:#D85A30}
.mb.act.best,.mb.act.worst{background:#1a1a1a}
.mb.fut{opacity:.2}
.mbn{display:flex;gap:3px;margin-top:3px}
.mbi{flex:1;font-size:9px;color:#999;text-align:center}
.mbi.act{font-weight:600;color:#1a1a1a}

/* CARDS */
.c4{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:.8rem}
.mc{background:#fff;border-radius:12px;padding:.75rem 1rem;border:.5px solid #e0e0d8}
.ml{font-size:11px;color:#888;margin-bottom:3px}
.mv{font-size:15px;font-weight:600;color:#1a1a1a}
.mv.g{color:#1D9E75}
.mv.r{color:#D85A30}

/* BUDGET */
.bud-wrap{background:#fff;border-radius:12px;padding:.75rem 1rem;margin-bottom:.8rem;border:.5px solid #e0e0d8}
.bud-row{display:flex;align-items:center;gap:8px}
.bud-lbl{font-size:12px;color:#888;flex-shrink:0}
.bud-prog{flex:1;height:6px;background:#e0e0d8;border-radius:3px;overflow:hidden}
.bud-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width .4s,background .3s}
.bud-fill.warn{background:#BA7517}
.bud-fill.over{background:#D85A30}
.bud-pct{font-size:12px;font-weight:600;min-width:36px;text-align:right}
.bud-pct.warn{color:#BA7517}
.bud-pct.over{color:#D85A30}
.bud-edit{font-size:11px;color:#888;cursor:pointer;border:none;background:none;font-family:inherit;padding:0 0 0 4px}
.bud-inp-row{display:flex;gap:6px;align-items:center;margin-top:8px}

/* CAT */
.cat-wrap{background:#fff;border-radius:12px;padding:.75rem 1rem;margin-bottom:.8rem;border:.5px solid #e0e0d8}
.cat-title{font-size:12px;font-weight:600;color:#888;margin-bottom:8px}
.cr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cname{font-size:12px;color:#666;width:88px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbar{flex:1;height:5px;background:#e0e0d8;border-radius:3px;overflow:hidden}
.cbf{height:100%;border-radius:3px}
.cval{font-size:11px;color:#888;width:64px;text-align:right;flex-shrink:0}

/* TABS */
.tabs-wrap{position:sticky;top:0;z-index:10;background:#f5f5f0;padding:.4rem 0 .4rem}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:.2rem 0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;font-size:13px;color:#888;cursor:pointer;border-radius:20px;border:.5px solid #e0e0d8;background:#fff;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab.act{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.panel{display:none}
.panel.act{display:block}

/* FORM */
.form-card{background:#fff;border-radius:12px;padding:.9rem 1rem;margin-bottom:.8rem;border:.5px solid #e0e0d8}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:12px;font-weight:600;color:#888;padding-left:2px}
.ir{display:flex;gap:8px;margin-bottom:.6rem;align-items:flex-end}
.inp{height:42px;padding:0 12px;font-size:15px;border:.5px solid #d0d0c8;border-radius:10px;background:#f8f8f4;color:#1a1a1a;font-family:inherit;transition:border-color .15s;width:100%}
.inp:focus{outline:none;border-color:#1a1a1a;background:#fff}
.inp.ok{border-color:#1D9E75}
.inp.af{background:#fff;border-color:#d0d0c8;color:#888;font-style:italic}
.hint{font-size:12px;color:#999;margin-bottom:.8rem}
.cn{font-size:11px;color:#1D9E75;margin-top:-4px;margin-bottom:.4rem;min-height:15px}
.btn-add{width:100%;height:44px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:.6rem}
.btn-add:active{opacity:.8}

/* SEARCH */
.srch-wrap{margin-bottom:8px}

/* LIST */
.sc{background:#fff;border-radius:12px;border:.5px solid #e0e0d8;overflow:hidden}
.item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:.5px solid #f0f0ea}
.item:last-child{border-bottom:none}
.ii{flex:1;min-width:0}
.in{font-size:14px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.im{font-size:11px;color:#999;margin-top:2px}
.ia{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;text-align:right}
.ia .s{font-size:11px;color:#999;font-weight:400;display:block}
.bdel{width:26px;height:26px;border-radius:50%;border:.5px solid #e0e0d8;background:transparent;color:#bbb;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.bdel:active{background:#fff0f0;color:#D85A30;border-color:#D85A30}
.pp{display:flex;align-items:center;gap:6px;margin-top:5px}
.pb{flex:1;height:4px;background:#e0e0d8;border-radius:2px;overflow:hidden}
.pf{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.pf.done{background:#bbb}
.pl{font-size:11px;color:#999;white-space:nowrap}
.bparc{height:24px;padding:0 8px;font-size:11px;border:.5px solid #d0d0c8;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap}
.bparc:active{background:#e8f8f0;color:#1D9E75}
.bparc:disabled{opacity:.3}
.tgl{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;background:#d0d0c8;flex-shrink:0;transition:background .2s}
.tgl.on{background:#1D9E75}
.tgl::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{left:19px}
.empty{text-align:center;padding:2rem 1rem;color:#bbb;font-size:14px}
.pnotice{background:#f8f8f4;border-radius:10px;padding:10px 14px;font-size:13px;color:#999;margin-bottom:.8rem;text-align:center;border:.5px solid #e0e0d8}

/* ANNUAL */
.ann-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ann-title{font-size:15px;font-weight:600;color:#1a1a1a}
.bexp{height:32px;padding:0 14px;font-size:12px;border:.5px solid #d0d0c8;border-radius:8px;background:transparent;color:#888;cursor:pointer;font-family:inherit}
.bexp:active{background:#f0f0ea}
.at{width:100%;font-size:12px;border-collapse:collapse}
.at th{text-align:left;font-size:11px;font-weight:600;color:#888;padding:0 6px 8px 0;border-bottom:.5px solid #e0e0d8}
.at td{padding:8px 6px 8px 0;border-bottom:.5px solid #f0f0ea;color:#1a1a1a;font-size:13px}
.at tr:last-child td{border-bottom:none}
.at tr.cur td{font-weight:600}
.at tr.best td{color:#1D9E75}
.at tr.worst td{color:#D85A30}
.at tr.ttl td{font-weight:700;border-top:.5px solid #d0d0c8;padding-top:10px}
.abar{height:4px;background:#e0e0d8;border-radius:2px;overflow:hidden;min-width:40px;margin-top:3px}
.abf{height:100%;background:#7F77DD;border-radius:2px}
.at tr.best .abf{background:#1D9E75}
.at tr.worst .abf{background:#D85A30}
.bdg{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.bdg.b{background:#e1f5ee;color:#0F6E56}
.bdg.w{background:#faece7;color:#993C1D}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <h1>Meus Gastos</h1>

  <!-- NAV -->
  <div class="nav">
    <div class="navg">
      <button class="bn" id="bnpy" onclick="changeYear(-1)">&#8249;</button>
      <div class="nv yr" id="yrv"></div>
      <button class="bn" id="bnny" onclick="changeYear(1)">&#8250;</button>
    </div>
    <div class="nsep"></div>
    <div class="navg">
      <button class="bn" id="bnpm" onclick="changeMonth(-1)">&#8249;</button>
      <div class="nv" id="mv"></div>
      <button class="bn" id="bnnm" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-wrap">
    <div class="chart-top"><span id="cyr"></span><span><span style="color:#1D9E75">&#9646; maior</span> &nbsp; <span style="color:#D85A30">&#9646; menor</span></span></div>
    <div class="bars12" id="bars12"></div>
    <div class="mbn" id="mbn"></div>
  </div>

  <!-- CARDS -->
  <div class="c4" id="cards"></div>

  <!-- BUDGET -->
  <div class="bud-wrap" id="bud-area"></div>

  <!-- CATEGORIES -->
  <div class="cat-wrap" id="cat-area" style="display:none"></div>

  <!-- TABS -->
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab act" onclick="sw('gastos',this)">Gastos</button>
      <button class="tab" onclick="sw('parc',this)">Parcelados</button>
      <button class="tab" onclick="sw('fixos',this)">Fixos</button>
      <button class="tab" onclick="sw('rec',this)">Receitas</button>
      <button class="tab" onclick="sw('anual',this)">Anual</button>
    </div>
  </div>

  <!-- GASTOS -->
  <div class="panel act" id="panel-gastos">
    <div id="pn-g"></div>
    <div id="form-g" class="form-card">
      <div class="ir">
        <div class="fg" style="flex:2"><span class="fl">Nome do gasto</span><input class="inp" id="an" type="text" placeholder="Ex: almoço, uber..." autocomplete="off"/></div>
        <div class="fg" style="flex:1"><span class="fl">Valor (R$)</span><input class="inp" id="av" type="number" placeholder="0,00" inputmode="decimal"/></div>
      </div>
      <div class="ir">
        <div class="fg" style="flex:1"><span class="fl">Categoria</span>
          <select class="inp" id="ac"><option>Alimentação</option><option>Transporte</option><option>Lazer</option><option>Saúde</option><option>Moradia</option><option>Educação</option><option>Roupas</option><option>Outros</option></select>
        </div>
      </div>
      <button class="btn-add" onclick="addA()">Adicionar gasto</button>
    </div>
    <div class="srch-wrap"><input class="inp" id="srch" type="text" placeholder="Buscar pelo nome..." oninput="renderLists()" style="background:#fff"/></div>
    <div class="sc"><div id="list-g"></div></div>
  </div>

  <!-- PARCELADOS -->
  <div class="panel" id="panel-parc">
    <div id="pn-p"></div>
    <div id="form-p" class="form-card">
      <div class="ir"><div class="fg" style="flex:1"><span class="fl">Nome</span><input class="inp" id="pn" type="text" placeholder="Ex: TV, notebook..." autocomplete="off"/></div></div>
      <div class="ir">
        <div class="fg" style="flex:1"><span class="fl">Nº parcelas</span><input class="inp" id="pp" type="number" placeholder="Ex: 12" inputmode="numeric"/></div>
        <div class="fg" style="flex:1"><span class="fl">Valor/parcela</span><input class="inp" id="pv" type="number" placeholder="0,00" inputmode="decimal"/></div>
        <div class="fg" style="flex:1"><span class="fl">Valor total</span><input class="inp" id="pt" type="number" placeholder="0,00" inputmode="decimal"/></div>
      </div>
      <div class="cn" id="pcn"></div>
      <button class="btn-add" onclick="addP()">Adicionar parcelado</button>
    </div>
    <div class="sc"><div id="list-p"></div></div>
  </div>

  <!-- FIXOS -->
  <div class="panel" id="panel-fixos">
    <div class="form-card">
      <div class="ir">
        <div class="fg" style="flex:2"><span class="fl">Nome do gasto fixo</span><input class="inp" id="fn" type="text" placeholder="Ex: aluguel, academia..." autocomplete="off"/></div>
        <div class="fg" style="flex:1"><span class="fl">Valor (R$)</span><input class="inp" id="fv" type="number" placeholder="0,00" inputmode="decimal"/></div>
      </div>
      <div class="ir"><div class="fg" style="flex:1"><span class="fl">Categoria</span>
        <select class="inp" id="fc"><option>Alimentação</option><option>Transporte</option><option>Lazer</option><option>Saúde</option><option>Moradia</option><option>Educação</option><option>Roupas</option><option>Outros</option></select>
      </div></div>
      <button class="btn-add" onclick="addF()">Adicionar fixo</button>
      <div class="hint" style="margin-bottom:0">Gastos fixos aparecem em todos os meses. Use o toggle para pausar.</div>
    </div>
    <div class="sc"><div id="list-f"></div></div>
  </div>

  <!-- RECEITAS -->
  <div class="panel" id="panel-rec">
    <div id="pn-r"></div>
    <div id="form-r" class="form-card">
      <div class="ir">
        <div class="fg" style="flex:2"><span class="fl">Nome da receita</span><input class="inp" id="rn" type="text" placeholder="Ex: salário, freela..." autocomplete="off"/></div>
        <div class="fg" style="flex:1"><span class="fl">Valor (R$)</span><input class="inp" id="rv" type="number" placeholder="0,00" inputmode="decimal"/></div>
      </div>
      <button class="btn-add" onclick="addR()">Adicionar receita</button>
    </div>
    <div class="sc"><div id="list-r"></div></div>
  </div>

  <!-- ANUAL -->
  <div class="panel" id="panel-anual">
    <div class="ann-hdr">
      <div class="ann-title" id="ann-title"></div>
      <button class="bexp" onclick="exportCSV()">Exportar CSV</button>
    </div>
    <div class="sc"><table class="at" id="list-anual" style="padding:1rem"></table></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const now=new Date();
let vY=now.getFullYear(),vM=now.getMonth();
let avulsos=[],parcelados=[],fixos=[],receitas=[],config={orcamento:0};
let pLock=false;
const MPT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CATS={'Alimentação':'#D85A30','Transporte':'#378ADD','Lazer':'#D4537E','Saúde':'#1D9E75','Moradia':'#7F77DD','Educação':'#BA7517','Roupas':'#E24B4A','Outros':'#888780'};

function fmt(v){return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toMK(y,m){return y+'-'+String(m+1).padStart(2,'0')}
function getMK(){return toMK(vY,vM)}
function isCur(){return vY===now.getFullYear()&&vM===now.getMonth()}
function sv(k,d){try{localStorage.setItem(k,JSON.stringify(d))}catch(e){}}
function ld(k,def){try{const r=localStorage.getItem(k);return r?JSON.parse(r):def}catch(e){return def}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function load(){
  avulsos=ld('mg_avulsos',[]);
  parcelados=ld('mg_parcelados',[]);
  fixos=ld('mg_fixos',[]);
  receitas=ld('mg_receitas',[]);
  config=ld('mg_config',{orcamento:0});
  render();
}

function changeMonth(d){vM+=d;if(vM>11){vM=0;vY++}if(vM<0){vM=11;vY--}render()}
function changeYear(d){vY+=d;if(vY===now.getFullYear()&&vM>now.getMonth())vM=now.getMonth();render()}
function jumpTo(y,m){vY=y;vM=m;render()}
function sw(tab,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));btn.classList.add('act');document.getElementById('panel-'+tab).classList.add('act')}

function avMK(mk){return avulsos.filter(g=>g.monthKey===mk)}
function recMK(mk){return receitas.filter(r=>r.monthKey===mk)}
function parMK(mk){return parcelados.filter(p=>p.monthKey<=mk)}
function fixTot(){return fixos.filter(f=>f.ativo!==false).reduce((s,f)=>s+f.valor,0)}
function gTot(mk){return avMK(mk).reduce((s,g)=>s+g.valor,0)+parMK(mk).reduce((s,p)=>s+(p.total/p.parc),0)+fixTot()}
function rTot(mk){return recMK(mk).reduce((s,r)=>s+r.valor,0)}

function addA(){
  const n=document.getElementById('an').value.trim(),v=parseFloat(document.getElementById('av').value),c=document.getElementById('ac').value;
  if(!n||!v||isNaN(v)||v<=0){toast('Preencha nome e valor');return}
  avulsos.unshift({id:Date.now(),nome:n,valor:v,cat:c,data:new Date().toLocaleDateString('pt-BR'),monthKey:getMK()});
  sv('mg_avulsos',avulsos);render();
  document.getElementById('an').value='';document.getElementById('av').value='';
  toast('Gasto adicionado!');
}
function delA(id){if(!confirm('Remover este gasto?'))return;avulsos=avulsos.filter(g=>g.id!==id);sv('mg_avulsos',avulsos);render()}

function calcP(ch){
  if(pLock)return;pLock=true;
  const nE=document.getElementById('pp'),vE=document.getElementById('pv'),tE=document.getElementById('pt');
  const n=parseFloat(nE.value),v=parseFloat(vE.value),t=parseFloat(tE.value),cn=document.getElementById('pcn');
  if(ch!=='total'&&!isNaN(n)&&n>=2&&!isNaN(v)&&v>0){const c=parseFloat((n*v).toFixed(2));tE.value=c;tE.classList.add('af');cn.textContent=n+' x R$ '+fmt(v)+' = R$ '+fmt(c)}
  else if(ch!=='vp'&&!isNaN(n)&&n>=2&&!isNaN(t)&&t>0){const c=parseFloat((t/n).toFixed(2));vE.value=c;vE.classList.add('af');cn.textContent='R$ '+fmt(t)+' ÷ '+n+' = R$ '+fmt(c)+'/parcela'}
  else if(ch!=='np'&&!isNaN(v)&&v>0&&!isNaN(t)&&t>0){const c=Math.round(t/v);nE.value=c;nE.classList.add('af');cn.textContent='R$ '+fmt(t)+' ÷ R$ '+fmt(v)+' = '+c+' parcelas'}
  else cn.textContent='';
  if(ch==='np')nE.classList.remove('af');if(ch==='vp')vE.classList.remove('af');if(ch==='total')tE.classList.remove('af');
  pLock=false;
}
function addP(){
  const n=document.getElementById('pn').value.trim(),np=parseFloat(document.getElementById('pp').value),t=parseFloat(document.getElementById('pt').value);
  if(!n||isNaN(np)||np<2||isNaN(t)||t<=0){toast('Preencha todos os campos');return}
  parcelados.unshift({id:Date.now(),nome:n,total:t,parc:Math.round(np),pagas:0,data:new Date().toLocaleDateString('pt-BR'),monthKey:getMK()});
  sv('mg_parcelados',parcelados);render();
  ['pn','pp','pv','pt'].forEach(id=>{document.getElementById(id).value='';document.getElementById(id).classList.remove('af')});
  document.getElementById('pcn').textContent='';toast('Parcelado adicionado!');
}
function pagP(id){const p=parcelados.find(x=>x.id===id);if(p&&p.pagas<p.parc){p.pagas++;sv('mg_parcelados',parcelados);render();toast('Parcela paga!')}}
function delP(id){if(!confirm('Remover?'))return;parcelados=parcelados.filter(p=>p.id!==id);sv('mg_parcelados',parcelados);render()}

document.getElementById('pp').addEventListener('input',()=>calcP('np'));
document.getElementById('pv').addEventListener('input',()=>calcP('vp'));
document.getElementById('pt').addEventListener('input',()=>calcP('total'));

function addF(){
  const n=document.getElementById('fn').value.trim(),v=parseFloat(document.getElementById('fv').value),c=document.getElementById('fc').value;
  if(!n||!v||isNaN(v)||v<=0){toast('Preencha nome e valor');return}
  fixos.push({id:Date.now(),nome:n,valor:v,cat:c,ativo:true});
  sv('mg_fixos',fixos);render();
  document.getElementById('fn').value='';document.getElementById('fv').value='';toast('Fixo adicionado!');
}
function togF(id){const f=fixos.find(x=>x.id===id);if(f){f.ativo=!f.ativo;sv('mg_fixos',fixos);render()}}
function delF(id){if(!confirm('Remover?'))return;fixos=fixos.filter(f=>f.id!==id);sv('mg_fixos',fixos);render()}

function addR(){
  const n=document.getElementById('rn').value.trim(),v=parseFloat(document.getElementById('rv').value);
  if(!n||!v||isNaN(v)||v<=0){toast('Preencha nome e valor');return}
  receitas.unshift({id:Date.now(),nome:n,valor:v,data:new Date().toLocaleDateString('pt-BR'),monthKey:getMK()});
  sv('mg_receitas',receitas);render();
  document.getElementById('rn').value='';document.getElementById('rv').value='';toast('Receita adicionada!');
}
function delR(id){if(!confirm('Remover?'))return;receitas=receitas.filter(r=>r.id!==id);sv('mg_receitas',receitas);render()}

function saveBudget(){const v=parseFloat(document.getElementById('bv').value);if(!isNaN(v)&&v>0){config.orcamento=v;sv('mg_config',config);render();toast('Orçamento salvo!')}}
function clearBudget(){config.orcamento=0;sv('mg_config',config);render()}
function togBudInput(){const r=document.getElementById('bud-inp-r');if(r)r.style.display=r.style.display==='none'?'flex':'none'}

function exportCSV(){
  const rows=[['Data','Nome','Tipo','Categoria','Valor']];
  const y0=toMK(vY,0),y1=toMK(vY,11);
  avulsos.filter(g=>g.monthKey>=y0&&g.monthKey<=y1).forEach(g=>rows.push([g.data,g.nome,'Gasto',g.cat||'Outros',g.valor.toFixed(2).replace('.',',')]));
  receitas.filter(r=>r.monthKey>=y0&&r.monthKey<=y1).forEach(r=>rows.push([r.data,r.nome,'Receita','',r.valor.toFixed(2).replace('.',',')]));
  fixos.filter(f=>f.ativo!==false).forEach(f=>rows.push(['Mensal',f.nome,'Fixo',f.cat||'Outros',f.valor.toFixed(2).replace('.',',')]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='gastos_'+vY+'.csv';a.click();
}

function renderLists(){
  const mk=getMK(),cur=isCur();
  const notice=cur?'':`<div class="pnotice">Visualizando ${MPT[vM]} ${vY} — somente leitura</div>`;
  ['pn-g','pn-p','pn-r'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=notice});
  document.getElementById('form-g').style.display=cur?'':'none';
  document.getElementById('form-p').style.display=cur?'':'none';
  document.getElementById('form-r').style.display=cur?'':'none';

  const srch=(document.getElementById('srch').value||'').toLowerCase().trim();
  const avM=avMK(mk).filter(g=>!srch||g.nome.toLowerCase().includes(srch));
  document.getElementById('list-g').innerHTML=avM.length===0?`<div class="empty">${srch?'Nenhum resultado.':'Nenhum gasto neste mês.'}</div>`:
    avM.map(g=>`<div class="item"><div class="cdot" style="background:${CATS[g.cat]||'#888'}"></div><div class="ii"><div class="in">${g.nome}</div><div class="im">${g.cat||'Outros'} · ${g.data}</div></div><div class="ia">R$ ${fmt(g.valor)}</div>${cur?`<button class="bdel" onclick="delA(${g.id})">✕</button>`:''}</div>`).join('');

  const pM=parMK(mk);
  document.getElementById('list-p').innerHTML=pM.length===0?'<div class="empty">Nenhuma compra parcelada.</div>':
    pM.map(p=>{const vp=p.total/p.parc,pct=Math.round((p.pagas/p.parc)*100),done=p.pagas>=p.parc;return`<div class="item"><div class="ii"><div class="in">${p.nome}</div><div class="im">${p.parc}x de R$ ${fmt(vp)} · Total R$ ${fmt(p.total)}</div><div class="pp"><div class="pb"><div class="pf${done?' done':''}" style="width:${pct}%"></div></div><span class="pl">${p.pagas}/${p.parc}</span>${cur?`<button class="bparc" onclick="pagP(${p.id})" ${done?'disabled':''}>+ pagar</button>`:''}</div></div><div class="ia">R$ ${fmt(vp)}/mês<span class="s">${done?'quitado':(p.parc-p.pagas)+'x restantes'}</span></div>${cur?`<button class="bdel" onclick="delP(${p.id})">✕</button>`:''}</div>`}).join('');

  document.getElementById('list-f').innerHTML=fixos.length===0?'<div class="empty">Nenhum gasto fixo cadastrado.</div>':
    fixos.map(f=>`<div class="item"><div class="cdot" style="background:${CATS[f.cat]||'#888'};opacity:${f.ativo===false?.3:1}"></div><div class="ii"><div class="in" style="opacity:${f.ativo===false?.4:1}">${f.nome}</div><div class="im">${f.cat||'Outros'} · mensal</div></div><div class="ia" style="opacity:${f.ativo===false?.4:1}">R$ ${fmt(f.valor)}</div><button class="tgl${f.ativo===false?'':' on'}" onclick="togF(${f.id})"></button><button class="bdel" onclick="delF(${f.id})">✕</button></div>`).join('');

  const rM=recMK(mk);
  document.getElementById('list-r').innerHTML=rM.length===0?'<div class="empty">Nenhuma receita neste mês.</div>':
    rM.map(r=>`<div class="item"><div class="ii"><div class="in">${r.nome}</div><div class="im">${r.data}</div></div><div class="ia" style="color:#1D9E75">+ R$ ${fmt(r.valor)}</div>${cur?`<button class="bdel" onclick="delR(${r.id})">✕</button>`:''}</div>`).join('');
}

function render(){
  const mk=getMK(),cur=isCur();
  document.getElementById('yrv').textContent=vY;
  document.getElementById('mv').textContent=MPT[vM]+(cur?' ●':'');
  document.getElementById('bnny').disabled=vY>=now.getFullYear();
  document.getElementById('bnnm').disabled=cur;

  const yr12=Array.from({length:12},(_,m)=>gTot(toMK(vY,m)));
  const maxC=Math.max(...yr12,1);
  const nonZ=yr12.filter(v=>v>0);
  const bestV=nonZ.length?Math.max(...nonZ):0;
  const worstV=nonZ.length>1?Math.min(...nonZ):0;
  document.getElementById('cyr').textContent=vY;
  document.getElementById('bars12').innerHTML=Array.from({length:12},(_,m)=>{
    const fut=vY===now.getFullYear()&&m>now.getMonth();
    const h=Math.max(3,Math.round((yr12[m]/maxC)*40));
    let c='mb';
    if(m===vM)c+=' act';
    else if(!fut&&yr12[m]===bestV&&bestV>0&&nonZ.length>1)c+=' best';
    else if(!fut&&yr12[m]===worstV&&worstV>0&&nonZ.length>1&&worstV<bestV)c+=' worst';
    if(fut)c+=' fut';
    return`<div class="${c}" style="height:${h}px" ${!fut?`onclick="jumpTo(${vY},${m})"`:''}></div>`;
  }).join('');
  document.getElementById('mbn').innerHTML=Array.from({length:12},(_,m)=>`<div class="mbi${m===vM?' act':''}">${MS[m]}</div>`).join('');

  const tA=avMK(mk).reduce((s,g)=>s+g.valor,0);
  const tP=parMK(mk).reduce((s,p)=>s+(p.total/p.parc),0);
  const tF=fixTot(),tG=tA+tP+tF,tR=rTot(mk),saldo=tR-tG;
  document.getElementById('cards').innerHTML=`
    <div class="mc"><div class="ml">Gastos do mês</div><div class="mv r">R$ ${fmt(tG)}</div></div>
    <div class="mc"><div class="ml">Receitas</div><div class="mv g">R$ ${fmt(tR)}</div></div>
    <div class="mc"><div class="ml">Saldo</div><div class="mv ${saldo>=0?'g':'r'}">R$ ${fmt(saldo)}</div></div>
    <div class="mc"><div class="ml">Fixos/mês</div><div class="mv">R$ ${fmt(tF)}</div></div>`;

  const ba=document.getElementById('bud-area');
  if(config.orcamento>0){
    const pct=tG/config.orcamento,pd=Math.round(pct*100),cls=pd>=100?'over':pd>=80?'warn':'';
    ba.innerHTML=`<div class="bud-row"><span class="bud-lbl">Orçamento R$ ${fmt(config.orcamento)}</span><div class="bud-prog"><div class="bud-fill ${cls}" style="width:${Math.min(pd,100)}%"></div></div><span class="bud-pct ${cls}">${pd}%</span><button class="bud-edit" onclick="togBudInput()">editar</button></div><div id="bud-inp-r" style="display:none;gap:6px;align-items:center;margin-top:8px"><input class="inp" id="bv" type="number" value="${config.orcamento}" style="flex:1" inputmode="decimal"/><button onclick="saveBudget()" style="height:42px;padding:0 14px;font-size:14px;border:.5px solid #d0d0c8;border-radius:10px;background:transparent;cursor:pointer;font-family:inherit">Salvar</button><button onclick="clearBudget()" style="height:42px;padding:0 14px;font-size:14px;border:.5px solid #d0d0c8;border-radius:10px;background:transparent;cursor:pointer;font-family:inherit;color:#999">Remover</button></div>`;
  }else{
    ba.innerHTML=`<div style="display:flex;gap:8px;align-items:flex-end"><div class="fg" style="flex:1"><span class="fl">Orçamento mensal (R$)</span><input class="inp" id="bv" type="number" placeholder="Ex: 3000" inputmode="decimal"/></div><button onclick="saveBudget()" style="height:42px;padding:0 16px;font-size:14px;border:.5px solid #d0d0c8;border-radius:10px;background:transparent;cursor:pointer;font-family:inherit;flex-shrink:0">Definir</button></div>`;
  }

  const ct={};
  avMK(mk).forEach(g=>{const c=g.cat||'Outros';ct[c]=(ct[c]||0)+g.valor});
  fixos.filter(f=>f.ativo!==false).forEach(f=>{const c=f.cat||'Outros';ct[c]=(ct[c]||0)+f.valor});
  const ctMax=Math.max(...Object.values(ct),1);
  const ctEntries=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
  const catEl=document.getElementById('cat-area');
  if(ctEntries.length>0){
    catEl.style.display='block';
    catEl.innerHTML='<div class="cat-title">Gastos por categoria</div>'+ctEntries.map(([c,v])=>`<div class="cr"><div class="cdot" style="background:${CATS[c]||'#888'}"></div><div class="cname">${c}</div><div class="cbar"><div class="cbf" style="width:${Math.round((v/ctMax)*100)}%;background:${CATS[c]||'#888'}"></div></div><div class="cval">R$ ${fmt(v)}</div></div>`).join('');
  }else{catEl.style.display='none'}

  document.getElementById('ann-title').textContent='Resumo anual '+vY;
  const annD=Array.from({length:12},(_,m)=>({m,g:gTot(toMK(vY,m)),r:rTot(toMK(vY,m))}));
  const vG=annD.filter(d=>d.g>0);
  const bG=vG.length?Math.max(...vG.map(d=>d.g)):0;
  const wG=vG.length>1?Math.min(...vG.map(d=>d.g)):0;
  const mxG=Math.max(...annD.map(d=>d.g),1);
  const totG=annD.reduce((s,d)=>s+d.g,0),totR=annD.reduce((s,d)=>s+d.r,0);
  document.getElementById('list-anual').innerHTML=`<thead><tr><th>Mês</th><th>Gastos</th><th>Receitas</th><th>Saldo</th></tr></thead><tbody>${annD.map(({m,g,r})=>{
    const fut=vY===now.getFullYear()&&m>now.getMonth();
    const isc=vY===now.getFullYear()&&m===now.getMonth();
    const cls=(g===bG&&g>0&&vG.length>1?'best':(wG>0&&g===wG&&vG.length>1&&g<bG?'worst':''))+(isc?' cur':'');
    const bdg=g===bG&&g>0&&vG.length>1?'<span class="bdg b">maior</span>':wG>0&&g===wG&&vG.length>1&&g<bG?'<span class="bdg w">menor</span>':'';
    const s=r-g;
    return`<tr class="${cls}" ${!fut?`onclick="jumpTo(${vY},${m})" style="cursor:pointer"`:''}>
      <td>${MS[m]}${bdg}</td><td>R$ ${fmt(g)}</td>
      <td>${r>0?'R$ '+fmt(r):'-'}</td>
      <td style="${r>0?(s>=0?'color:#1D9E75':'color:#D85A30'):''}">${r>0?'R$ '+fmt(s):'-'}</td>
    </tr>`;
  }).join('')}<tr class="ttl"><td>Total ${vY}</td><td>R$ ${fmt(totG)}</td><td>R$ ${fmt(totR)}</td><td style="${totR-totG>=0?'color:#1D9E75':'color:#D85A30'}">R$ ${fmt(totR-totG)}</td></tr></tbody>`;

  renderLists();
}

load();
</script>
</body>
